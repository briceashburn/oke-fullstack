apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: true
      serviceAccountName: backend-sa
      volumes:
      - name: oci-credentials
        secret:
          secretName: oci-credentials
          items:
          - key: config
            path: config
          - key: key
            path: key
      containers:
      - name: backend
        image: docker.io/briceashburn/backend:##VERSION##
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 300
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /readiness
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: oci-credentials
          mountPath: /oci
          readOnly: true
        env:
        - name: OCI_REGION
          value: "us-chicago-1"
        - name: USE_INSTANCE_PRINCIPAL
          value: "false"
        - name: OCI_CONFIG_FILE
          value: "/oci/config"
        - name: OCI_KEY_FILE
          value: "/oci/key"
        - name: OCI_COMPARTMENT_ID
          valueFrom:
            secretKeyRef:
              name: oci-config
              key: compartment-id
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: backend
